services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: always
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
      - TUNNEL_TRANSPORT_PROTOCOL=${CF_PROTOCOL:-auto}
    command: tunnel --no-autoupdate run
    networks:
      - cloudweb

networks:
  cloudweb:
    external: true